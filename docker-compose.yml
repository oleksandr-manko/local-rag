version: '3.8'

services:
  # Qdrant Vector Database
  qdrant:
    image: qdrant/qdrant:latest
    container_name: rag-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    environment:
      - QDRANT__SERVICE__GRPC_PORT=6334
    healthcheck:
      test:
        - CMD-SHELL
        - bash -c ':> /dev/tcp/127.0.0.1/6333' || exit 1
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    networks:
      - rag-network
    restart: unless-stopped

  # Redis Hash Store
  redis:
    image: redis:7-alpine
    container_name: rag-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - rag-network
    restart: unless-stopped

  # RAG Application
  rag-app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: rag-app
    ports:
      - "8081:8080"
    volumes:
      # Mount documents folder from host to container
      - ./documents:/app/documents
      # Mount logs folder for persistence
      - ./logs:/app/logs
    environment:
      #  wget http://host.docker.internal:11434/api/tags
      # Ollama Configuration (running on host)
      - OLLAMA_HOST=host.docker.internal
      - OLLAMA_PORT=11434
      - OLLAMA_MODEL_NAME=gpt-oss:20b
      - OLLAMA_EMBEDDING_MODEL_NAME=qwen3-embedding:8b
      - OLLAMA_VISION_MODEL_NAME=qwen3-vl:8b
      
      # OpenAI API Configuration
      - OPENAI_API_MODEL_NAME=local
      - OPENAI_API_CREATION_DATE=1773532800
      - OPENAI_API_OWNED_BY=host-machine
      
      # Qdrant Configuration
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6334
      - QDRANT_COLLECTION_NAME=documents
      - QDRANT_VECTOR_DIMENSION=768
      
      # Redis Configuration
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_DATABASE=0
      
      # Document Processing Configuration
      - DOCUMENTS_INPUT_FOLDER=/app/documents
      
      # Processing Job Configuration
      - PROCESSING_SCHEDULE=0 */15 * * * *
      - PROCESSING_CHUNK_SIZE=512
      - PROCESSING_CHUNK_OVERLAP=50
      - PROCESSING_BATCH_SIZE=100
      
      # RAG Configuration
      - RAG_TOP_K_RESULTS=5
      - RAG_SIMILARITY_THRESHOLD=0.7
      
      # Logging Configuration
      - LOGGING_LEVEL_ROOT=INFO
      - LOGGING_LEVEL_COM_RAG_OPENAI=DEBUG
    depends_on:
      qdrant:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    networks:
      - rag-network
    extra_hosts:
      # Allow container to access Ollama on host machine
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

# Named volumes for data persistence
volumes:
  qdrant_data:
    driver: local
  redis_data:
    driver: local

# Network for service communication
networks:
  rag-network:
    driver: bridge
